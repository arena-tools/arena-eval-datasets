name: Delete Langfuse Datasets

on:
  workflow_dispatch:
    inputs:
      dataset_names:
        description: 'Comma-separated list of Langfuse dataset names to delete'
        required: true

jobs:
  delete:
    runs-on: self-hosted-runner

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Delete datasets from Langfuse
        env:
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_BASE_URL: ${{ secrets.LANGFUSE_BASE_URL }}
        run: npx tsx scripts/delete-datasets.ts --names "${{ inputs.dataset_names }}"
