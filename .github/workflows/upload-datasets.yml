name: Upload SRC Eval Datasets to Langfuse

on:
  push:
    branches: [main]
    paths:
      - 'datasets/src/**'
  workflow_dispatch:
    inputs:
      board_id:
        description: 'Board directory to upload (or "all")'
        required: true
        default: 'all'
      dry_run:
        description: 'Preview without uploading'
        type: boolean
        default: false

jobs:
  upload:
    runs-on: self-hosted-atlas
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Need previous commit for --changed detection

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run dataset upload (push trigger)
        if: github.event_name == 'push'
        env:
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_BASE_URL: ${{ secrets.LANGFUSE_BASE_URL }}
        run: npx tsx scripts/upload-datasets.ts --changed

      - name: Run dataset upload (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        env:
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_BASE_URL: ${{ secrets.LANGFUSE_BASE_URL }}
        run: |
          ARGS=""
          if [ "${{ inputs.board_id }}" = "all" ]; then
            ARGS="--all"
          else
            ARGS="--board ${{ inputs.board_id }}"
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          npx tsx scripts/upload-datasets.ts $ARGS

      - name: Commit upload receipts and manifest
        if: inputs.dry_run != true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add datasets/src/manifest.json datasets/src/*/last-upload.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update dataset upload receipts and manifest"
            git push
          fi
