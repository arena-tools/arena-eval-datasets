name: Validate Datasheet Lookup Datasets

on:
  pull_request:
    branches: [main]
    paths:
      - 'datasets/datasheet_lookup/**'

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate dataset CSVs
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
        run: npx tsx scripts/validate-datasheet-lookup.ts --changed
